name: Release to PowerShell Gallery

# Publish flow: bump ModuleVersion / Prerelease in psmm.psd1, commit, then
#   git tag v<ModuleVersion>[-<Prerelease>]   (e.g. v0.1.0-beta2, v0.1.0)
#   git push --tags
# The workflow refuses to publish if the tag doesn't match the manifest,
# and never publishes without the full quality gate passing first.
# Requires the repo secret PSGALLERY_API_KEY (scoped to the psmm package).

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Gate + publish
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Tag must match the manifest version
        shell: pwsh
        run: |
          $manifest = Import-PowerShellDataFile ./psmm.psd1
          $pre = $manifest.PrivateData.PSData.Prerelease
          $expected = "v$($manifest.ModuleVersion)$(if ($pre) { "-$pre" })"
          $tag = '${{ github.ref_name }}'
          if ($tag -ne $expected) {
            throw "Tag '$tag' does not match the manifest ('$expected'). Bump psmm.psd1 or fix the tag."
          }
          Write-Host "Tag $tag matches the manifest."

      # Both of these used to be found only by the Gallery itself, at the very
      # last step, after the whole quality gate had already run - and one of
      # them (ordering) would not have been found at all, it would just have
      # published a version nobody could update to. See RELEASE-CHECKLIST.md E.
      - name: Prerelease label must be publishable, and must outrank what is live
        shell: pwsh
        run: |
          $manifest = Import-PowerShellDataFile ./psmm.psd1
          $pre = "$($manifest.PrivateData.PSData.Prerelease)"
          # The Gallery allows only a-zA-Z0-9 (plus a leading hyphen) - NOT the
          # dots SemVer allows. 'rc.1' is rejected server-side; Test-ModuleManifest
          # accepts it locally, so this is the only place it can be caught early.
          if ($pre -and $pre -notmatch '^-?[a-zA-Z0-9]+$') {
            throw "Prerelease '$pre' is not publishable: the Gallery allows only a-zA-Z0-9 (and a leading hyphen). Dots are out."
          }
          $new = "$($manifest.ModuleVersion)$(if ($pre) { "-$pre" })"
          # A prerelease label is compared LEXICALLY, so 'beta10' < 'beta9' and
          # publishing it would leave the Gallery serving the older build. Trust
          # nothing about the label - compare against every version that is live.
          . ./src/Engine/SelfUpdate.ps1        # Compare-PSMMVersion, self-contained
          $uri = "https://www.powershellgallery.com/api/v2/FindPackagesById()?id='psmm'&semVerLevel=2.0.0"
          $live = @(@(Invoke-RestMethod -Uri $uri -TimeoutSec 60) | Where-Object { $_ } |
                    ForEach-Object { "$($_.properties.Version)" } | Where-Object { $_ })
          Write-Host "$($live.Count) version(s) already on the Gallery."
          foreach ($v in $live) {
            if ((Compare-PSMMVersion -A $new -B $v) -le 0) {
              throw "$new does not sort above the published $v. It would publish, but the Gallery would keep serving $v as latest and Update-PSResource would never offer it."
            }
          }
          Write-Host "$new outranks all $($live.Count) published version(s)."

      - name: Install tooling
        shell: pwsh
        run: |
          Install-PSResource -Name PSScriptAnalyzer -Scope CurrentUser -TrustRepository
          Install-PSResource -Name Pester -Scope CurrentUser -TrustRepository
          Install-PSResource -Name PwshSpectreConsole -Scope CurrentUser -TrustRepository

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1 -Severity Error, Warning
          $results | Format-Table -AutoSize | Out-String | Write-Host
          if (@($results).Count) { throw "PSScriptAnalyzer found $(@($results).Count) issue(s)" }

      - name: Pester (full suite)
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './Tests'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

      - name: Stage shippable content
        shell: pwsh
        run: |
          $stage = Join-Path $env:RUNNER_TEMP 'psmm-stage/psmm'
          New-Item -ItemType Directory -Force $stage | Out-Null
          'psmm.psd1','psmm.psm1','src','Configs','LICENSE','README.md','CHANGELOG.md' |
              ForEach-Object { Copy-Item $_ $stage -Recurse }
          "STAGE=$stage" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Publish to PSGallery
        shell: pwsh
        run: |
          Publish-PSResource -Path $env:STAGE -Repository PSGallery -ApiKey '${{ secrets.PSGALLERY_API_KEY }}'

      - name: Verify it landed
        shell: pwsh
        run: |
          $manifest = Import-PowerShellDataFile ./psmm.psd1
          $pre = $manifest.PrivateData.PSData.Prerelease
          $expected = "$($manifest.ModuleVersion)$(if ($pre) { "-$pre" })"
          # the gallery can take a moment to index a fresh push
          foreach ($try in 1..10) {
            $found = Find-PSResource -Name psmm -Prerelease -Repository PSGallery -ErrorAction SilentlyContinue |
                     Where-Object { "$($_.Version)" -like "$($manifest.ModuleVersion)*" -and "$($_.Prerelease)" -eq "$pre" }
            if ($found) { Write-Host "Published and findable: psmm $expected"; exit 0 }
            Start-Sleep -Seconds 30
          }
          throw "psmm $expected not findable on PSGallery after 5 minutes"
